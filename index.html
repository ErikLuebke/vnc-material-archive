<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VNC Material Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier Prime', monospace; background: white; color: black; }
        .header { border-bottom: 1px solid black; padding: 30px; margin-bottom: 30px; }
        .header h1 { font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .header p { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
        .container { max-width: 950px; margin: 0 auto; padding: 0 20px 40px; }
        .tabs { display: flex; border-bottom: 1px solid black; margin-bottom: 40px; gap: 0; }
        .tab-btn { padding: 12px 20px; border: none; background: white; cursor: pointer; font-size: 11px; font-weight: bold; border-bottom: 2px solid white; font-family: 'Courier Prime', monospace; letter-spacing: 1px; text-transform: uppercase; color: black; }
        .tab-btn.active { border-bottom: 2px solid black; }
        .tab-btn:hover { background: #f0f0f0; }
        .content { display: none; }
        .content.active { display: block; }
        .form-section { margin-bottom: 30px; }
        .form-section h2 { font-size: 10px; font-weight: bold; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid black; letter-spacing: 1px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; font-size: 10px; }
        th { background: white; font-weight: bold; text-transform: uppercase; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { padding: 8px; border: 1px solid black; background: white; color: black; font-size: 10px; font-family: 'Courier Prime', monospace; width: 100%; }
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .checkbox-item { display: flex; gap: 6px; align-items: center; }
        .checkbox-item input { width: auto; }
        .checkbox-item label { margin: 0; text-transform: none; }
        button { padding: 10px 16px; border: 1px solid black; background: white; color: black; cursor: pointer; font-weight: bold; font-family: 'Courier Prime', monospace; text-transform: uppercase; font-size: 10px; }
        button:hover { background: #f0f0f0; }
        button.primary { background: black; color: white; }
        button.primary:hover { background: #333; }
        .buttons { display: flex; gap: 10px; margin-top: 30px; }
        .message { padding: 12px; border: 1px solid black; margin-bottom: 20px; font-size: 10px; display: none; }
        .success { color: black; }
        .error { color: red; border-color: red; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid black; padding: 12px; }
        .card h3 { font-size: 10px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .card p { font-size: 9px; margin-bottom: 6px; }
        .badges { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
        .badge { border: 1px solid black; padding: 2px 6px; font-size: 8px; font-weight: bold; text-transform: uppercase; }
        .empty { padding: 40px; text-align: center; font-size: 11px; }
        .loading { padding: 20px; text-align: center; }
        .filters { margin-bottom: 20px; }
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>VNC Venice Project</h1>
        <p>Material Research Unit</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="form">Add Material</button>
            <button class="tab-btn" data-tab="archive">View Archive</button>
        </div>

        <div id="form" class="content active">
            <div class="message success" id="successMsg">✓ Material saved!</div>
            <div class="message error" id="errorMsg"></div>

            <form id="form-material">
                <div style="margin-bottom: 20px;">
                    <label>Material Name *</label>
                    <input type="text" id="materialName" required>
                    <label style="margin-top: 10px;">Code *</label>
                    <input type="text" id="code" required>
                </div>

                <div class="form-section">
                    <h2>General Data</h2>
                    <table>
                        <tr>
                            <th>Provider</th>
                            <td><input type="text" id="provider"></td>
                        </tr>
                        <tr>
                            <th>Cost</th>
                            <td><input type="text" id="cost"></td>
                        </tr>
                    </table>
                </div>

                <div class="form-section">
                    <h2>System Data</h2>
                    <table>
                        <tr>
                            <th>Process</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="FOLD" name="process"> <label>Fold</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="EXTRUDE" name="process"> <label>Extrude</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="CAST" name="process"> <label>Cast</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="CUT" name="process"> <label>Cut</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>System Type</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="LINEAR" name="systemType"> <label>Linear</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="PANEL" name="systemType"> <label>Panel</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FRAME" name="systemType"> <label>Frame</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="MODULAR" name="systemType"> <label>Modular</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>Structural Logic</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="SELF-SUPPORTING" name="structuralLogic"> <label>Self-sup</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="SUPPORTED" name="structuralLogic"> <label>Supported</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="SUSPENDED" name="structuralLogic"> <label>Suspended</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="ATTACHED" name="structuralLogic"> <label>Attached</label></div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>

                <div class="form-section">
                    <h2>Spatial Definition</h2>
                    <table>
                        <tr>
                            <th>Spatial Role</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="STRUCTURE" name="spatialRole"> <label>Structure</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="DIVIDER" name="spatialRole"> <label>Divider</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="SURFACE" name="spatialRole"> <label>Surface</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FILTER" name="spatialRole"> <label>Filter</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>Scale</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="OBJECT" name="scale"> <label>Object</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FURNITURE" name="scale"> <label>Furniture</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="ROOM" name="scale"> <label>Room</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="BUILDING" name="scale"> <label>Building</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>Position</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="FLOOR" name="position"> <label>Floor</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="WALL" name="position"> <label>Wall</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="CEILING" name="position"> <label>Ceiling</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FREESTANDING" name="position"> <label>Freestanding</label></div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>

                <div class="form-section">
                    <h2>Notes</h2>
                    <textarea id="notes" style="min-height: 80px;"></textarea>
                </div>

                <div class="buttons">
                    <button type="submit" class="primary">Save Material</button>
                    <button type="reset">Clear</button>
                </div>
            </form>
        </div>

        <div id="archive" class="content">
            <div class="filters">
                <input type="text" id="search" placeholder="Search by name or code..." style="width: 100%; margin-bottom: 15px;">
                <div class="filter-row">
                    <select id="filterProcess"><option value="">All processes</option><option value="FOLD">Fold</option><option value="EXTRUDE">Extrude</option></select>
                    <select id="filterSystemType"><option value="">All types</option><option value="LINEAR">Linear</option><option value="PANEL">Panel</option></select>
                    <select id="filterScale"><option value="">All scales</option><option value="OBJECT">Object</option><option value="ROOM">Room</option></select>
                </div>
            </div>
            <div id="grid" class="grid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient('https://wlkqoacibkoepxpccjin.supabase.co', 'sb_publishable_jTzU8HTvBD97YbH0NlWBDQ_VqYJ34pI');

        // Tab switcher
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(tab).classList.add('active');
                if (tab === 'archive') loadArchive();
            });
        });

        // Form submit
        document.getElementById('form-material').addEventListener('submit', async (e) => {
            e.preventDefault();
            const getChecked = (name) => Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(x => x.value).join(', ');
            
            const data = {
                material_name: document.getElementById('materialName').value,
                code: document.getElementById('code').value,
                provider: document.getElementById('provider').value,
                cost: document.getElementById('cost').value,
                process: getChecked('process'),
                system_type: getChecked('systemType'),
                structural_logic: getChecked('structuralLogic'),
                spatial_role: getChecked('spatialRole'),
                scale: getChecked('scale'),
                position: getChecked('position'),
                notes: document.getElementById('notes').value
            };

            try {
                await supabase.from('materials').insert([data]);
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('form-material').reset();
                setTimeout(() => document.getElementById('successMsg').style.display = 'none', 3000);
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Error: ' + err.message;
                document.getElementById('errorMsg').style.display = 'block';
            }
        });

        // Load archive
        async function loadArchive() {
            document.getElementById('grid').innerHTML = '<div class="loading">Loading...</div>';
            try {
                const { data } = await supabase.from('materials').select('*').order('id', { ascending: false });
                const search = document.getElementById('search').value.toLowerCase();
                let filtered = data.filter(m => !search || m.material_name.toLowerCase().includes(search) || m.code.toLowerCase().includes(search));
                
                if (filtered.length === 0) {
                    document.getElementById('grid').innerHTML = '<div class="empty">No materials found</div>';
                    return;
                }
                
                document.getElementById('grid').innerHTML = filtered.map(m => `
                    <div class="card">
                        <h3>${m.material_name}</h3>
                        <p><strong>Code:</strong> ${m.code}</p>
                        ${m.provider ? `<p><strong>Provider:</strong> ${m.provider}</p>` : ''}
                        ${m.cost ? `<p><strong>Cost:</strong> ${m.cost}</p>` : ''}
                        <div class="badges">
                            ${m.process ? m.process.split(', ').map(p => `<span class="badge">${p}</span>`).join('') : ''}
                            ${m.system_type ? m.system_type.split(', ').map(p => `<span class="badge">${p}</span>`).join('') : ''}
                        </div>
                        ${m.notes ? `<p>${m.notes}</p>` : ''}
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('grid').innerHTML = '<div class="empty">Error: ' + err.message + '</div>';
            }
        }

        document.getElementById('search').addEventListener('keyup', loadArchive);
        document.getElementById('filterProcess').addEventListener('change', loadArchive);
        document.getElementById('filterSystemType').addEventListener('change', loadArchive);
        document.getElementById('filterScale').addEventListener('change', loadArchive);
    </script>
</body>
</html>
